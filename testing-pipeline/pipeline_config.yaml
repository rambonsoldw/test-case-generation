# ============================================================
# pipeline_config.yaml
#
# Global defaults apply to every document unless overridden.
# Per-document entries only need an 'input' field at minimum.
# Any default can be overridden on a per-document basis.
# ============================================================

defaults:
  model: gpt-5-mini
  base_questions_per_topic: 3
  variations: 2
  workers: 20
  max_pageindex_pages: 300
  debug: false
  import_flag: false

documents:
  - input: ./documents/RACV motor-insurance-pds-current.pdf
    industry: insurance

  - input: ./documents/member-guide.pdf
    industry: health

  - input: ./documents/bupa-fund-rules-full.pdf
    industry: insurance

  - input: ./documents/black-60-extras-updated 2.pdf
    industry: health
